<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 360px;
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 12px;
        font-size: 13px;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        color: #555;
        font-size: 11px;
      }
      input {
        width: 100%;
        padding: 5px 7px;
        font-size: 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }
      .row {
        margin-bottom: 8px;
      }
      .buttons {
        display: flex;
        gap: 6px;
        margin: 10px 0;
      }
      button {
        padding: 6px 12px;
        font-size: 12px;
        border: 1px solid #ccc;
        background: #fff;
        border-radius: 4px;
        cursor: pointer;
      }
      button.primary {
        background: #1a1a1a;
        color: #fff;
        border-color: #1a1a1a;
      }
      pre#status {
        background: #f4f4f4;
        border: 1px solid #ddd;
        padding: 8px;
        font-size: 11px;
        margin: 0;
        white-space: pre-wrap;
        max-height: 200px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <h1>netflix-deadline 同期</h1>
    <div class="row">
      <label for="apiUrl">API URL</label>
      <input id="apiUrl" placeholder="http://localhost:8787" />
    </div>
    <div class="row">
      <label for="token">ペアリングトークン</label>
      <input id="token" placeholder="dev-token-abc123" />
    </div>
    <div class="buttons">
      <button id="save">設定保存</button>
      <button id="sync" class="primary">マイリストを同期</button>
      <button id="match">突き合わせ</button>
    </div>
    <pre id="status">
Netflix / Prime のマイリストページを開いて「同期」を押してください。</pre
    >
    <script type="module" src="popup.js"></script>
  </body>
</html>
