name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# 同時デプロイを防ぐ（前のデプロイが終わるまで次は待つ）
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: |
          npm run typecheck -w @netflix-deadline/shared
          npm run typecheck -w @netflix-deadline/api
          npm run typecheck -w @netflix-deadline/web

      # web の build + wrangler deploy をワンコマンドで実行
      - name: Deploy to Cloudflare Workers
        run: npm run deploy -w @netflix-deadline/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
